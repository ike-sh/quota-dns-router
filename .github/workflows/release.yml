name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          for bin in qdr-master qdr-agent; do
            out_dir="$(mktemp -d)"
            if [ "$bin" = "qdr-master" ]; then
              pkg="./cmd/qdr-master"
            else
              pkg="./cmd/qdr-agent"
            fi

            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o "${out_dir}/${bin}" "${pkg}"

            "${out_dir}/${bin}" version

            printf '%s\n' \
              "${bin} ${GITHUB_REF_NAME}" \
              "" \
              "Extract the archive and install the binary to /usr/local/bin." \
              > "${out_dir}/README.txt"

            tar -C "${out_dir}" -czf "dist/${bin}_linux_amd64.tar.gz" "${bin}" README.txt
            rm -rf "${out_dir}"
          done

          cd dist
          sha256sum qdr-master_linux_amd64.tar.gz qdr-agent_linux_amd64.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/qdr-master_linux_amd64.tar.gz
            dist/qdr-agent_linux_amd64.tar.gz
            dist/SHA256SUMS
